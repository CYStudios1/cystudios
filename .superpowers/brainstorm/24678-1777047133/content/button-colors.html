<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CY Studios — Button Colors</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; background: #1a1008; }

  .section { min-height: 100vh; background: #F2E4D8; position: relative; overflow: hidden; display: flex; flex-direction: column; }
  .divider { height: 4px; background: #1a1008; }

  .section-label { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; background: #1a1008; color: rgba(255,255,255,0.82); font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; padding: 7px 20px; border-radius: 99px; white-space: nowrap; }

  .bg-layer { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .arcs-svg { position: absolute; top: -8%; right: -6%; width: 80%; height: 120%; }
  .mark { position: absolute; border-radius: 50%; background: #b83228; animation: mpulse 4s ease-in-out infinite; }
  @keyframes mpulse { 0%,100%{opacity:0.25;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

  .nav { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 0 64px; height: 64px; background: transparent; border-bottom: 1px solid rgba(26,16,8,0.08); }
  .nav-logo { font-size: 16px; font-weight: 800; color: #1a1008; letter-spacing: 0.04em; text-transform: uppercase; }
  .nav-links { display: flex; gap: 36px; position: absolute; left: 50%; transform: translateX(-50%); }
  .nav-links span { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #5a4e44; }

  .hero-content { flex: 1; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 60px 64px 48px; position: relative; z-index: 10; max-width: 680px; }
  .hero-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #b83228; background: rgba(184,50,40,0.1); border: 1px solid rgba(184,50,40,0.2); padding: 6px 16px; border-radius: 99px; margin-bottom: 28px; }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; animation: pdot 2s infinite; }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero-headline { font-size: clamp(52px, 6.5vw, 86px); font-weight: 800; line-height: 1.02; color: #1a1008; margin-bottom: 22px; }
  .hero-sub { font-size: 16px; font-weight: 300; color: #5a4e44; line-height: 1.85; max-width: 440px; margin-bottom: 36px; }

  .btn { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 30px; border-radius: 6px; display: inline-block; }

  .ticker { position: relative; z-index: 10; border-top: 1px solid rgba(26,16,8,0.1); background: rgba(26,16,8,0.04); padding: 13px 0; overflow: hidden; white-space: nowrap; }
  .ticker-track { display: inline-flex; animation: tick 20s linear infinite; }
  .ticker-item { display: inline-flex; align-items: center; gap: 16px; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #5a4e44; padding-right: 40px; }
  .tdot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
  @keyframes tick { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* Swatch strip */
  .swatch-strip { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
  .swatch { width: 20px; height: 20px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); }
  .swatch-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #5a4e44; }
</style>
</head>
<body>

<!-- shared arc background macro -->
<template id="arc-bg">
  <svg class="arcs-svg" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid meet">
    <circle cx="600" cy="350" r="80"  stroke="#1a1008" stroke-width="1" opacity="0.07"/>
    <circle cx="600" cy="350" r="140" stroke="#1a1008" stroke-width="1" opacity="0.065"/>
    <circle cx="600" cy="350" r="200" stroke="#1a1008" stroke-width="1" opacity="0.06"/>
    <circle cx="600" cy="350" r="265" stroke="#1a1008" stroke-width="1" opacity="0.055"/>
    <circle cx="600" cy="350" r="335" stroke="#1a1008" stroke-width="1" opacity="0.05"/>
    <circle cx="600" cy="350" r="410" stroke="#1a1008" stroke-width="1" opacity="0.045"/>
    <circle cx="600" cy="350" r="490" stroke="#1a1008" stroke-width="1" opacity="0.04"/>
    <circle cx="600" cy="350" r="575" stroke="#1a1008" stroke-width="1" opacity="0.035"/>
    <circle cx="600" cy="350" r="665" stroke="#b83228" stroke-width="0.75" opacity="0.06"/>
    <line x1="580" y1="350" x2="620" y2="350" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
    <line x1="600" y1="330" x2="600" y2="372" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
    <circle cx="600" cy="350" r="4" fill="#b83228" opacity="0.2"/>
  </svg>
</template>

<script>
  function makeSection(label, btnBg, btnColor, navCtaBg, navCtaColor, pillDotColor, tdotColor, note) {
    const s = document.createElement('div');
    s.className = 'section';
    s.innerHTML = `
      <div class="section-label">${label}</div>
      <div class="bg-layer">
        <svg class="arcs-svg" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid meet">
          <circle cx="600" cy="350" r="80"  stroke="#1a1008" stroke-width="1" opacity="0.07"/>
          <circle cx="600" cy="350" r="140" stroke="#1a1008" stroke-width="1" opacity="0.065"/>
          <circle cx="600" cy="350" r="200" stroke="#1a1008" stroke-width="1" opacity="0.06"/>
          <circle cx="600" cy="350" r="265" stroke="#1a1008" stroke-width="1" opacity="0.055"/>
          <circle cx="600" cy="350" r="335" stroke="#1a1008" stroke-width="1" opacity="0.05"/>
          <circle cx="600" cy="350" r="410" stroke="#1a1008" stroke-width="1" opacity="0.045"/>
          <circle cx="600" cy="350" r="490" stroke="#1a1008" stroke-width="1" opacity="0.04"/>
          <circle cx="600" cy="350" r="575" stroke="#1a1008" stroke-width="1" opacity="0.035"/>
          <circle cx="600" cy="350" r="665" stroke="#b83228" stroke-width="0.75" opacity="0.06"/>
          <line x1="580" y1="350" x2="620" y2="350" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
          <line x1="600" y1="330" x2="600" y2="372" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
          <circle cx="600" cy="350" r="4" fill="#b83228" opacity="0.2"/>
        </svg>
        <div class="mark" style="width:5px;height:5px;top:28%;left:68%;animation-delay:0s"></div>
        <div class="mark" style="width:4px;height:4px;top:62%;left:82%;animation-delay:1.2s"></div>
        <div class="mark" style="width:6px;height:6px;top:44%;left:74%;animation-delay:2.4s"></div>
        <div class="mark" style="width:3px;height:3px;top:72%;left:60%;animation-delay:0.8s"></div>
        <div class="mark" style="width:5px;height:5px;top:6%;left:76%;animation-delay:1.8s"></div>
      </div>
      <div class="nav">
        <div class="nav-logo">CY Studios</div>
        <div class="nav-links"><span>Services</span><span>About</span><span>Cohorts</span><span>Pricing</span><span>FAQ</span></div>
        <div class="btn" style="background:${navCtaBg};color:${navCtaColor};padding:9px 22px;border-radius:5px;font-size:11px;">Book a Consultation</div>
      </div>
      <div class="hero-content">
        <div class="hero-pill"><span class="pill-dot" style="background:${pillDotColor}"></span>Now Booking — Summer Cohort</div>
        <div class="hero-headline">Your brand,<br>built with<br>intention.</div>
        <div class="hero-sub">CY Studios is a boutique creative agency taking clients in cohorts — so every brand gets the attention it deserves.</div>
        <div style="display:flex;flex-direction:column;gap:12px;align-items:flex-start;">
          <div class="btn" style="background:${btnBg};color:${btnColor};">Book a Consultation →</div>
          <div class="swatch-strip">
            <div class="swatch" style="background:${btnBg}"></div>
            <div class="swatch-label">${note}</div>
          </div>
        </div>
      </div>
      <div class="ticker"><div class="ticker-track">
        <span class="ticker-item">Spring Cohort <span class="tdot" style="background:${tdotColor}"></span> Fully Booked</span>
        <span class="ticker-item">Summer Cohort <span class="tdot" style="background:${tdotColor}"></span> Now Booking</span>
        <span class="ticker-item">Website Design <span class="tdot" style="background:${tdotColor}"></span> Social Media <span class="tdot" style="background:${tdotColor}"></span> SEO <span class="tdot" style="background:${tdotColor}"></span> GenAI</span>
        <span class="ticker-item">Spring Cohort <span class="tdot" style="background:${tdotColor}"></span> Fully Booked</span>
        <span class="ticker-item">Summer Cohort <span class="tdot" style="background:${tdotColor}"></span> Now Booking</span>
        <span class="ticker-item">Website Design <span class="tdot" style="background:${tdotColor}"></span> Social Media <span class="tdot" style="background:${tdotColor}"></span> SEO <span class="tdot" style="background:${tdotColor}"></span> GenAI</span>
      </div></div>
    `;
    return s;
  }

  const configs = [
    {
      label: 'Current — Crimson Red',
      btnBg: '#B83228', btnColor: '#fff',
      navCtaBg: '#B83228', navCtaColor: '#fff',
      pillDot: '#b83228', tdot: '#b83228',
      note: '#B83228 — current pick'
    },
    {
      label: 'Option 2 — Deep Ink (dark brown)',
      btnBg: '#1A1008', btnColor: '#fff',
      navCtaBg: '#1A1008', navCtaColor: '#fff',
      pillDot: '#b83228', tdot: '#b83228',
      note: '#1A1008 — matches the headline ink'
    },
    {
      label: 'Option 3 — Warm Orange',
      btnBg: '#C8541E', btnColor: '#fff',
      navCtaBg: '#C8541E', navCtaColor: '#fff',
      pillDot: '#C8541E', tdot: '#C8541E',
      note: '#C8541E — warmer, more terracotta-adjacent'
    },
    {
      label: 'Option 4 — Ghost (outlined)',
      btnBg: 'transparent', btnColor: '#1A1008',
      navCtaBg: 'transparent', navCtaColor: '#1A1008',
      pillDot: '#b83228', tdot: '#b83228',
      note: 'No fill — ink border & text only'
    },
    {
      label: 'Option 5 — Off-white / Cream',
      btnBg: '#FAF3EC', btnColor: '#1A1008',
      navCtaBg: '#FAF3EC', navCtaColor: '#1A1008',
      pillDot: '#b83228', tdot: '#b83228',
      note: '#FAF3EC — light, warm cream'
    },
  ];

  // Add ghost button border via inline style patch after render
  document.addEventListener('DOMContentLoaded', () => {
    configs.forEach((c, i) => {
      const sec = makeSection(c.label, c.btnBg, c.btnColor, c.navCtaBg, c.navCtaColor, c.pillDot, c.tdot, c.note);
      document.body.appendChild(sec);
      if (i < configs.length - 1) {
        const div = document.createElement('div');
        div.className = 'divider';
        document.body.appendChild(div);
      }
      // patch ghost border
      if (c.btnBg === 'transparent') {
        sec.querySelectorAll('.btn').forEach(b => {
          b.style.border = '1.5px solid #1a1008';
        });
      }
    });
  });
</script>

</body>
</html>
