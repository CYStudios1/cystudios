<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CY Studios — Logo Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; background: #1a1008; }

  /* ── Hero (condensed, just for context) ── */
  .hero { height: 72px; background: #F2E4D8; position: relative; overflow: hidden; display: flex; align-items: center; border-bottom: 1px solid rgba(26,16,8,0.08); padding: 0 64px; justify-content: space-between; }
  .hero-logo { font-size: 16px; font-weight: 800; color: #1a1008; letter-spacing: 0.04em; text-transform: uppercase; }
  .hero-stub { font-size: 11px; font-weight: 500; color: #5a4e44; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── Logo Ticker Section ── */
  .logo-section {
    background: #F2E4D8;
    padding: 48px 0;
    overflow: hidden;
    border-top: 1px solid rgba(26,16,8,0.07);
    border-bottom: 1px solid rgba(26,16,8,0.07);
    position: relative;
  }

  /* Fade edges */
  .logo-section::before,
  .logo-section::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 120px;
    z-index: 10;
    pointer-events: none;
  }
  .logo-section::before {
    left: 0;
    background: linear-gradient(to right, #F2E4D8, transparent);
  }
  .logo-section::after {
    right: 0;
    background: linear-gradient(to left, #F2E4D8, transparent);
  }

  .logo-track-wrap { overflow: hidden; }

  .logo-track {
    display: inline-flex;
    align-items: center;
    gap: 100px;
    animation: logoScroll 28s linear infinite;
    white-space: nowrap;
  }

  /* Animate by exactly 1 set (25% of 4 sets) so seam is invisible */
  @keyframes logoScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-25%); }
  }

  /* Each logo item */
  .logo-item {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0.45;
    transition: opacity 0.3s ease;
    flex-shrink: 0;
  }
  .logo-item:hover { opacity: 0.75; }

  /* Placeholder logo shapes — swap for real <img> tags in build */
  .logo-placeholder {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #1a1008;
  }

  /* Logo A — wordmark style */
  .logo-a { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: #1a1008; }

  /* Logo B — icon + wordmark */
  .logo-b-wrap { display: flex; align-items: center; gap: 9px; }
  .logo-b-mark { width: 28px; height: 28px; border-radius: 6px; background: #1a1008; }
  .logo-b-text { font-size: 18px; font-weight: 700; letter-spacing: 0.01em; color: #1a1008; }

  /* Logo C — stacked tight */
  .logo-c { display: flex; flex-direction: column; line-height: 1; }
  .logo-c-top { font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #1a1008; }
  .logo-c-bot { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: #1a1008; }

  /* Logo D — circle mark */
  .logo-d-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-d-mark { width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid #1a1008; display: flex; align-items: center; justify-content: center; }
  .logo-d-inner { width: 12px; height: 12px; background: #1a1008; border-radius: 50%; }
  .logo-d-text { font-size: 18px; font-weight: 700; color: #1a1008; }

  /* ── Section below for contrast ── */
  .below { height: 120px; background: #F2E4D8; display: flex; align-items: center; justify-content: center; }
  .below-hint { font-size: 11px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(26,16,8,0.25); }
</style>
</head>
<body>

<!-- Hero nav stub for context -->
<div class="hero">
  <div class="hero-logo">CY Studios</div>
  <div class="hero-stub">↑ Hero section above</div>
  <div class="hero-stub">Book a Consultation</div>
</div>

<!-- Logo Ticker -->
<div class="logo-section">
  <div class="logo-track-wrap">
    <div class="logo-track">

      <!-- 4 identical sets — animates by 1 set (25%) so loop is perfectly seamless -->
      <!-- Set 1 -->
      <div class="logo-item"><div class="logo-a">Brandmark</div></div>
      <div class="logo-item"><div class="logo-b-wrap"><div class="logo-b-mark"></div><div class="logo-b-text">Studio Co</div></div></div>
      <div class="logo-item"><div class="logo-c"><div class="logo-c-top">The</div><div class="logo-c-bot">Agency</div></div></div>
      <div class="logo-item"><div class="logo-d-wrap"><div class="logo-d-mark"><div class="logo-d-inner"></div></div><div class="logo-d-text">Venture</div></div></div>
      <!-- Set 2 -->
      <div class="logo-item"><div class="logo-a">Brandmark</div></div>
      <div class="logo-item"><div class="logo-b-wrap"><div class="logo-b-mark"></div><div class="logo-b-text">Studio Co</div></div></div>
      <div class="logo-item"><div class="logo-c"><div class="logo-c-top">The</div><div class="logo-c-bot">Agency</div></div></div>
      <div class="logo-item"><div class="logo-d-wrap"><div class="logo-d-mark"><div class="logo-d-inner"></div></div><div class="logo-d-text">Venture</div></div></div>
      <!-- Set 3 -->
      <div class="logo-item"><div class="logo-a">Brandmark</div></div>
      <div class="logo-item"><div class="logo-b-wrap"><div class="logo-b-mark"></div><div class="logo-b-text">Studio Co</div></div></div>
      <div class="logo-item"><div class="logo-c"><div class="logo-c-top">The</div><div class="logo-c-bot">Agency</div></div></div>
      <div class="logo-item"><div class="logo-d-wrap"><div class="logo-d-mark"><div class="logo-d-inner"></div></div><div class="logo-d-text">Venture</div></div></div>
      <!-- Set 4 -->
      <div class="logo-item"><div class="logo-a">Brandmark</div></div>
      <div class="logo-item"><div class="logo-b-wrap"><div class="logo-b-mark"></div><div class="logo-b-text">Studio Co</div></div></div>
      <div class="logo-item"><div class="logo-c"><div class="logo-c-top">The</div><div class="logo-c-bot">Agency</div></div></div>
      <div class="logo-item"><div class="logo-d-wrap"><div class="logo-d-mark"><div class="logo-d-inner"></div></div><div class="logo-d-text">Venture</div></div></div>

    </div>
  </div>
</div>

<!-- Stub for next section -->
<div class="below">
  <div class="below-hint">↓ About section below</div>
</div>

</body>
</html>
