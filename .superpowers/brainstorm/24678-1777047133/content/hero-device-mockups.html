<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CY Studios — Device Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; background: #1a1008; }

  .section { min-height: 100vh; background: #F2E4D8; position: relative; overflow: hidden; display: flex; flex-direction: column; }
  .divider { height: 4px; background: #1a1008; }
  .section-label { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; background: #1a1008; color: rgba(255,255,255,0.85); font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; padding: 7px 20px; border-radius: 99px; white-space: nowrap; }

  /* Arc background */
  .bg-layer { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .arcs-svg { position: absolute; top: -8%; right: -6%; width: 80%; height: 120%; }
  .mark { position: absolute; border-radius: 50%; background: #b83228; animation: mpulse 4s ease-in-out infinite; }
  @keyframes mpulse { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.3)} }

  /* Nav */
  .nav { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 0 64px; height: 64px; background: transparent; border-bottom: 1px solid rgba(26,16,8,0.08); }
  .nav-logo { font-size: 16px; font-weight: 800; color: #1a1008; letter-spacing: 0.04em; text-transform: uppercase; }
  .nav-links { display: flex; gap: 36px; position: absolute; left: 50%; transform: translateX(-50%); }
  .nav-links span { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #5a4e44; }
  .nav-cta { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: #b83228; color: #fff; padding: 9px 22px; border-radius: 5px; }

  /* Hero layout — split */
  .hero-body { flex: 1; display: grid; grid-template-columns: 1fr 1fr; position: relative; z-index: 10; }

  .hero-content { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 60px 48px 48px 64px; }
  .hero-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #b83228; background: rgba(184,50,40,0.1); border: 1px solid rgba(184,50,40,0.2); padding: 6px 16px; border-radius: 99px; margin-bottom: 28px; }
  .pill-dot { width: 6px; height: 6px; background: #b83228; border-radius: 50%; animation: pdot 2s infinite; }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero-headline { font-size: clamp(40px, 4.5vw, 68px); font-weight: 800; line-height: 1.02; color: #1a1008; margin-bottom: 20px; }
  .hero-sub { font-size: 15px; font-weight: 300; color: #5a4e44; line-height: 1.85; max-width: 380px; margin-bottom: 32px; }
  .btn { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: #b83228; color: #fff; padding: 13px 28px; border-radius: 6px; display: inline-block; }

  /* Device container — right side */
  .device-side { display: flex; align-items: center; justify-content: center; padding: 40px 48px 40px 24px; position: relative; }

  /* ── LAPTOP ── */
  .laptop { position: relative; width: 440px; }
  .laptop-screen-wrap { background: #1a1008; border-radius: 10px 10px 0 0; padding: 10px 10px 0; box-shadow: 0 30px 80px rgba(26,16,8,0.25); }
  .laptop-screen { background: #fff; border-radius: 4px; overflow: hidden; aspect-ratio: 16/10; position: relative; }
  .laptop-base { background: #2a2018; height: 16px; border-radius: 0 0 4px 4px; display: flex; justify-content: center; align-items: center; }
  .laptop-notch { width: 60px; height: 6px; background: #1a1008; border-radius: 0 0 4px 4px; }
  .laptop-foot { background: #222; height: 4px; border-radius: 0 0 8px 8px; margin: 0 30px; }

  /* ── BROWSER ── */
  .browser { width: 460px; background: #fff; border-radius: 10px; box-shadow: 0 30px 80px rgba(26,16,8,0.22); overflow: hidden; }
  .browser-bar { background: #f0ebe4; padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(26,16,8,0.08); }
  .browser-dots { display: flex; gap: 6px; }
  .browser-dot { width: 10px; height: 10px; border-radius: 50%; }
  .browser-url { flex: 1; background: #fff; border-radius: 5px; padding: 5px 12px; font-size: 11px; font-weight: 500; color: #5a4e44; letter-spacing: 0.02em; border: 1px solid rgba(26,16,8,0.08); }
  .browser-content { aspect-ratio: 16/10; background: #fff; position: relative; overflow: hidden; }

  /* ── TILTED LAPTOP ── */
  .tilt-wrap { perspective: 1200px; width: 480px; }
  .laptop-tilt { transform: rotateY(-18deg) rotateX(4deg); transform-style: preserve-3d; box-shadow: 30px 40px 100px rgba(26,16,8,0.3); border-radius: 10px 10px 0 0; }

  /* Fake website content inside screens */
  .fake-site { width: 100%; height: 100%; background: linear-gradient(135deg, #f8f4f0 0%, #fff 100%); display: flex; flex-direction: column; }
  .fake-nav { height: 36px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 16px; gap: 12px; }
  .fake-logo-bar { width: 40px; height: 6px; background: #1a1008; border-radius: 3px; }
  .fake-links { display: flex; gap: 8px; margin-left: auto; }
  .fake-link { width: 24px; height: 4px; background: #ccc; border-radius: 2px; }
  .fake-hero { flex: 1; display: flex; align-items: center; padding: 16px; gap: 12px; }
  .fake-text-block { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .fake-h1 { height: 10px; background: #1a1008; border-radius: 3px; width: 80%; }
  .fake-h1b { height: 10px; background: #1a1008; border-radius: 3px; width: 60%; }
  .fake-p { height: 5px; background: #ddd; border-radius: 2px; margin-top: 4px; }
  .fake-p2 { height: 5px; background: #ddd; border-radius: 2px; width: 75%; }
  .fake-cta-bar { width: 60px; height: 18px; background: #b83228; border-radius: 3px; margin-top: 8px; }
  .fake-img { width: 38%; aspect-ratio: 1; background: linear-gradient(135deg, #e8d5bb, #d4b896); border-radius: 6px; }
  .fake-cards { display: flex; gap: 6px; padding: 10px 16px; }
  .fake-card { flex: 1; height: 40px; background: #f0ebe4; border-radius: 4px; border: 1px solid #e8e0d8; }

  /* Ticker */
  .ticker { position: relative; z-index: 10; border-top: 1px solid rgba(26,16,8,0.1); background: rgba(26,16,8,0.04); padding: 13px 0; overflow: hidden; white-space: nowrap; }
  .ticker-track { display: inline-flex; animation: tick 20s linear infinite; }
  .ticker-item { display: inline-flex; align-items: center; gap: 16px; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #5a4e44; padding-right: 40px; }
  .tdot { width: 4px; height: 4px; background: #b83228; border-radius: 50%; flex-shrink: 0; }
  @keyframes tick { from{transform:translateX(0)} to{transform:translateX(-50%)} }
</style>
</head>
<body>

<!-- ══ SHARED ELEMENTS ══ -->
<template id="arcs">
  <svg class="arcs-svg" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid meet">
    <circle cx="600" cy="350" r="80"  stroke="#1a1008" stroke-width="1" opacity="0.07"/>
    <circle cx="600" cy="350" r="140" stroke="#1a1008" stroke-width="1" opacity="0.065"/>
    <circle cx="600" cy="350" r="200" stroke="#1a1008" stroke-width="1" opacity="0.06"/>
    <circle cx="600" cy="350" r="265" stroke="#1a1008" stroke-width="1" opacity="0.055"/>
    <circle cx="600" cy="350" r="335" stroke="#1a1008" stroke-width="1" opacity="0.05"/>
    <circle cx="600" cy="350" r="410" stroke="#1a1008" stroke-width="1" opacity="0.045"/>
    <circle cx="600" cy="350" r="490" stroke="#1a1008" stroke-width="1" opacity="0.04"/>
    <circle cx="600" cy="350" r="575" stroke="#1a1008" stroke-width="1" opacity="0.035"/>
    <circle cx="600" cy="350" r="665" stroke="#b83228" stroke-width="0.75" opacity="0.06"/>
    <line x1="580" y1="350" x2="620" y2="350" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
    <line x1="600" y1="330" x2="600" y2="372" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
    <circle cx="600" cy="350" r="4" fill="#b83228" opacity="0.2"/>
  </svg>
</template>

<!-- fake site content reusable -->
<template id="fake-site-tpl">
  <div class="fake-site">
    <div class="fake-nav">
      <div class="fake-logo-bar"></div>
      <div class="fake-links">
        <div class="fake-link"></div>
        <div class="fake-link"></div>
        <div class="fake-link"></div>
      </div>
    </div>
    <div class="fake-hero">
      <div class="fake-text-block">
        <div class="fake-h1"></div>
        <div class="fake-h1b"></div>
        <div class="fake-p"></div>
        <div class="fake-p2"></div>
        <div class="fake-cta-bar"></div>
      </div>
      <div class="fake-img"></div>
    </div>
    <div class="fake-cards">
      <div class="fake-card"></div>
      <div class="fake-card"></div>
      <div class="fake-card"></div>
    </div>
  </div>
</template>

<script>
function arcsBg() {
  return `<svg class="arcs-svg" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid meet">
    <circle cx="600" cy="350" r="80"  stroke="#1a1008" stroke-width="1" opacity="0.07"/>
    <circle cx="600" cy="350" r="140" stroke="#1a1008" stroke-width="1" opacity="0.065"/>
    <circle cx="600" cy="350" r="200" stroke="#1a1008" stroke-width="1" opacity="0.06"/>
    <circle cx="600" cy="350" r="265" stroke="#1a1008" stroke-width="1" opacity="0.055"/>
    <circle cx="600" cy="350" r="335" stroke="#1a1008" stroke-width="1" opacity="0.05"/>
    <circle cx="600" cy="350" r="410" stroke="#1a1008" stroke-width="1" opacity="0.045"/>
    <circle cx="600" cy="350" r="490" stroke="#1a1008" stroke-width="1" opacity="0.04"/>
    <circle cx="600" cy="350" r="575" stroke="#1a1008" stroke-width="1" opacity="0.035"/>
    <circle cx="600" cy="350" r="665" stroke="#b83228" stroke-width="0.75" opacity="0.06"/>
    <line x1="580" y1="350" x2="620" y2="350" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
    <line x1="600" y1="330" x2="600" y2="372" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
    <circle cx="600" cy="350" r="4" fill="#b83228" opacity="0.2"/>
  </svg>
  <div class="mark" style="width:5px;height:5px;top:28%;left:68%;animation-delay:0s"></div>
  <div class="mark" style="width:4px;height:4px;top:62%;left:82%;animation-delay:1.2s"></div>
  <div class="mark" style="width:6px;height:6px;top:44%;left:74%;animation-delay:2.4s"></div>`;
}

function fakeSite() {
  return `<div class="fake-site">
    <div class="fake-nav"><div class="fake-logo-bar"></div><div class="fake-links"><div class="fake-link"></div><div class="fake-link"></div><div class="fake-link"></div></div></div>
    <div class="fake-hero"><div class="fake-text-block"><div class="fake-h1"></div><div class="fake-h1b"></div><div class="fake-p"></div><div class="fake-p2"></div><div class="fake-cta-bar"></div></div><div class="fake-img"></div></div>
    <div class="fake-cards"><div class="fake-card"></div><div class="fake-card"></div><div class="fake-card"></div></div>
  </div>`;
}

function heroContent() {
  return `<div class="hero-content">
    <div class="hero-pill"><span class="pill-dot"></span>Now Booking — Summer Cohort</div>
    <div class="hero-headline">Your brand,<br>built with<br>intention.</div>
    <div class="hero-sub">CY Studios is a boutique creative agency taking clients in cohorts — so every brand gets the attention it deserves.</div>
    <div class="btn">Book a Consultation →</div>
  </div>`;
}

function ticker() {
  return `<div class="ticker"><div class="ticker-track">
    <span class="ticker-item">Spring Cohort <span class="tdot"></span> Fully Booked</span>
    <span class="ticker-item">Summer Cohort <span class="tdot"></span> Now Booking</span>
    <span class="ticker-item">Website Design <span class="tdot"></span> Social Media <span class="tdot"></span> SEO <span class="tdot"></span> GenAI Marketing</span>
    <span class="ticker-item">Spring Cohort <span class="tdot"></span> Fully Booked</span>
    <span class="ticker-item">Summer Cohort <span class="tdot"></span> Now Booking</span>
    <span class="ticker-item">Website Design <span class="tdot"></span> Social Media <span class="tdot"></span> SEO <span class="tdot"></span> GenAI Marketing</span>
  </div></div>`;
}

function nav() {
  return `<div class="nav">
    <div class="nav-logo">CY Studios</div>
    <div class="nav-links"><span>Services</span><span>About</span><span>Cohorts</span><span>Pricing</span><span>FAQ</span></div>
    <div class="nav-cta">Book a Consultation</div>
  </div>`;
}

document.addEventListener('DOMContentLoaded', () => {

  // ── 1: LAPTOP (flat) ──
  document.body.insertAdjacentHTML('beforeend', `
    <div class="section">
      <div class="section-label">Option 1 — Laptop Mockup (flat)</div>
      <div class="bg-layer">${arcsBg()}</div>
      ${nav()}
      <div class="hero-body">
        ${heroContent()}
        <div class="device-side">
          <div class="laptop">
            <div class="laptop-screen-wrap">
              <div class="laptop-screen">${fakeSite()}</div>
            </div>
            <div class="laptop-base"><div class="laptop-notch"></div></div>
            <div class="laptop-foot"></div>
          </div>
        </div>
      </div>
      ${ticker()}
    </div>
    <div class="divider"></div>
  `);

  // ── 2: BROWSER WINDOW ──
  document.body.insertAdjacentHTML('beforeend', `
    <div class="section">
      <div class="section-label">Option 2 — Browser Window</div>
      <div class="bg-layer">${arcsBg()}</div>
      ${nav()}
      <div class="hero-body">
        ${heroContent()}
        <div class="device-side">
          <div class="browser" style="box-shadow:0 30px 80px rgba(26,16,8,0.22);">
            <div class="browser-bar">
              <div class="browser-dots">
                <div class="browser-dot" style="background:#ff5f57"></div>
                <div class="browser-dot" style="background:#febc2e"></div>
                <div class="browser-dot" style="background:#28c840"></div>
              </div>
              <div class="browser-url">cystudios.co</div>
            </div>
            <div class="browser-content">${fakeSite()}</div>
          </div>
        </div>
      </div>
      ${ticker()}
    </div>
    <div class="divider"></div>
  `);

  // ── 3: TILTED LAPTOP (3D perspective) ──
  document.body.insertAdjacentHTML('beforeend', `
    <div class="section">
      <div class="section-label">Option 3 — Laptop Tilted (3D perspective)</div>
      <div class="bg-layer">${arcsBg()}</div>
      ${nav()}
      <div class="hero-body">
        ${heroContent()}
        <div class="device-side" style="perspective:1200px;">
          <div class="laptop" style="transform:rotateY(-18deg) rotateX(4deg);transform-style:preserve-3d;box-shadow:30px 40px 100px rgba(26,16,8,0.28);">
            <div class="laptop-screen-wrap">
              <div class="laptop-screen">${fakeSite()}</div>
            </div>
            <div class="laptop-base"><div class="laptop-notch"></div></div>
            <div class="laptop-foot"></div>
          </div>
        </div>
      </div>
      ${ticker()}
    </div>
  `);

});
</script>

</body>
</html>
