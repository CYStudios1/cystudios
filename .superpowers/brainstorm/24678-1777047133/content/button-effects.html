<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CY Studios — Button Effects</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; background: #1a1008; }

  .section { min-height: 100vh; background: #F2E4D8; position: relative; overflow: hidden; display: flex; flex-direction: column; }
  .divider { height: 4px; background: #1a1008; }
  .section-label { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30; background: #1a1008; color: rgba(255,255,255,0.85); font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; padding: 7px 20px; border-radius: 99px; white-space: nowrap; }

  .bg-layer { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .arcs-svg { position: absolute; top: -8%; right: -6%; width: 80%; height: 120%; }
  .mark { position: absolute; border-radius: 50%; background: #b83228; animation: mpulse 4s ease-in-out infinite; }
  @keyframes mpulse { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.3)} }

  .nav { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 0 64px; height: 64px; background: transparent; border-bottom: 1px solid rgba(26,16,8,0.08); }
  .nav-logo { font-size: 16px; font-weight: 800; color: #1a1008; letter-spacing: 0.04em; text-transform: uppercase; }
  .nav-links { display: flex; gap: 36px; position: absolute; left: 50%; transform: translateX(-50%); }
  .nav-links span { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #5a4e44; }

  .hero-body { flex: 1; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 60px 64px 48px; position: relative; z-index: 10; max-width: 680px; }
  .hero-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #b83228; background: rgba(184,50,40,0.1); border: 1px solid rgba(184,50,40,0.2); padding: 6px 16px; border-radius: 99px; margin-bottom: 28px; }
  .pill-dot { width: 6px; height: 6px; background: #b83228; border-radius: 50%; animation: pdot 2s infinite; }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero-headline { font-size: clamp(48px, 6vw, 80px); font-weight: 800; line-height: 1.02; color: #1a1008; margin-bottom: 20px; }
  .hero-sub { font-size: 16px; font-weight: 300; color: #5a4e44; line-height: 1.85; max-width: 440px; margin-bottom: 36px; }

  /* Effect label */
  .effect-meta { margin-top: 14px; display: flex; flex-direction: column; gap: 4px; }
  .effect-name { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #1a1008; }
  .effect-desc { font-size: 12px; font-weight: 300; color: #5a4e44; }

  .ticker { position: relative; z-index: 10; border-top: 1px solid rgba(26,16,8,0.1); background: rgba(26,16,8,0.04); padding: 13px 0; overflow: hidden; white-space: nowrap; }
  .ticker-track { display: inline-flex; animation: tick 20s linear infinite; }
  .ticker-item { display: inline-flex; align-items: center; gap: 16px; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #5a4e44; padding-right: 40px; }
  .tdot { width: 4px; height: 4px; background: #b83228; border-radius: 50%; flex-shrink: 0; }
  @keyframes tick { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* ══════════════════════════════════════
     BUTTON VARIATIONS
  ══════════════════════════════════════ */

  /* Base shared */
  .btn-base {
    font-family: 'Raleway', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 14px 30px; border-radius: 6px;
    display: inline-block; cursor: pointer; border: none;
    transition: all 0.25s ease;
    text-decoration: none;
  }

  /* 1 — Lifted drop shadow */
  .btn-shadow {
    background: #b83228; color: #fff;
    box-shadow: 0 4px 14px rgba(184,50,40,0.35), 0 1px 3px rgba(184,50,40,0.2);
  }
  .btn-shadow:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(184,50,40,0.45), 0 4px 8px rgba(184,50,40,0.25);
  }
  .btn-shadow:active { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(184,50,40,0.4); }

  /* 2 — Shimmer sweep */
  .btn-shimmer {
    background: #b83228; color: #fff;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 8px rgba(184,50,40,0.2);
  }
  .btn-shimmer::after {
    content: '';
    position: absolute;
    top: -50%; left: -75%;
    width: 50%; height: 200%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.28), transparent);
    transform: skewX(-20deg);
    transition: left 0.55s ease;
  }
  .btn-shimmer:hover::after { left: 130%; }
  .btn-shimmer:hover { box-shadow: 0 4px 16px rgba(184,50,40,0.35); }

  /* 3 — Gradient fill */
  .btn-gradient {
    background: linear-gradient(110deg, #b83228 0%, #d44a28 55%, #b83228 100%);
    background-size: 200% 100%;
    background-position: 100% 0;
    color: #fff;
    box-shadow: 0 2px 8px rgba(184,50,40,0.2);
    transition: background-position 0.4s ease, box-shadow 0.25s ease, transform 0.2s ease;
  }
  .btn-gradient:hover {
    background-position: 0% 0;
    box-shadow: 0 6px 20px rgba(184,50,40,0.4);
    transform: translateY(-2px);
  }

  /* 4 — Outline border expand */
  .btn-outline {
    background: #b83228; color: #fff;
    box-shadow: 0 0 0 0 rgba(184,50,40,0);
    transition: box-shadow 0.3s ease, transform 0.2s ease;
  }
  .btn-outline:hover {
    transform: translateY(-2px);
    box-shadow:
      0 0 0 3px #F2E4D8,
      0 0 0 5px #b83228,
      0 8px 24px rgba(184,50,40,0.3);
  }

  /* 5 — Fill sweep left-to-right */
  .btn-sweep {
    background: transparent;
    color: #b83228;
    border: 1.5px solid #b83228;
    position: relative;
    overflow: hidden;
    z-index: 0;
  }
  .btn-sweep::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #b83228;
    transform: translateX(-101%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: -1;
  }
  .btn-sweep:hover { color: #fff; }
  .btn-sweep:hover::before { transform: translateX(0); }
</style>
</head>
<body>

<script>
function arcsBg() {
  return `<svg class="arcs-svg" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid meet">
    <circle cx="600" cy="350" r="80"  stroke="#1a1008" stroke-width="1" opacity="0.07"/>
    <circle cx="600" cy="350" r="140" stroke="#1a1008" stroke-width="1" opacity="0.065"/>
    <circle cx="600" cy="350" r="200" stroke="#1a1008" stroke-width="1" opacity="0.06"/>
    <circle cx="600" cy="350" r="265" stroke="#1a1008" stroke-width="1" opacity="0.055"/>
    <circle cx="600" cy="350" r="335" stroke="#1a1008" stroke-width="1" opacity="0.05"/>
    <circle cx="600" cy="350" r="410" stroke="#1a1008" stroke-width="1" opacity="0.045"/>
    <circle cx="600" cy="350" r="490" stroke="#1a1008" stroke-width="1" opacity="0.04"/>
    <circle cx="600" cy="350" r="575" stroke="#1a1008" stroke-width="1" opacity="0.035"/>
    <circle cx="600" cy="350" r="665" stroke="#b83228" stroke-width="0.75" opacity="0.06"/>
    <line x1="580" y1="350" x2="620" y2="350" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
    <line x1="600" y1="330" x2="600" y2="372" stroke="#b83228" stroke-width="0.75" opacity="0.18"/>
    <circle cx="600" cy="350" r="4" fill="#b83228" opacity="0.2"/>
  </svg>
  <div class="mark" style="width:5px;height:5px;top:28%;left:68%;animation-delay:0s"></div>
  <div class="mark" style="width:4px;height:4px;top:62%;left:82%;animation-delay:1.2s"></div>
  <div class="mark" style="width:6px;height:6px;top:44%;left:74%;animation-delay:2.4s"></div>`;
}

function nav(ctaClass, ctaLabel) {
  return `<div class="nav">
    <div class="nav-logo">CY Studios</div>
    <div class="nav-links"><span>Services</span><span>About</span><span>Cohorts</span><span>Pricing</span><span>FAQ</span></div>
    <button class="btn-base ${ctaClass}" style="padding:9px 22px;border-radius:5px;font-size:11px;">${ctaLabel || 'Book a Consultation'}</button>
  </div>`;
}

function ticker() {
  return `<div class="ticker"><div class="ticker-track">
    <span class="ticker-item">Spring Cohort <span class="tdot"></span> Fully Booked</span>
    <span class="ticker-item">Summer Cohort <span class="tdot"></span> Now Booking</span>
    <span class="ticker-item">Website Design <span class="tdot"></span> Social Media <span class="tdot"></span> SEO <span class="tdot"></span> GenAI Marketing</span>
    <span class="ticker-item">Spring Cohort <span class="tdot"></span> Fully Booked</span>
    <span class="ticker-item">Summer Cohort <span class="tdot"></span> Now Booking</span>
    <span class="ticker-item">Website Design <span class="tdot"></span> Social Media <span class="tdot"></span> SEO <span class="tdot"></span> GenAI Marketing</span>
  </div></div>`;
}

const sections = [
  {
    label: 'Option 1 — Lifted Drop Shadow',
    cls: 'btn-shadow',
    name: 'Lifted Drop Shadow',
    desc: 'Floats up 3px on hover, shadow deepens. Satisfying & premium.',
  },
  {
    label: 'Option 2 — Shimmer Sweep',
    cls: 'btn-shimmer',
    name: 'Shimmer Sweep',
    desc: 'A light streak races across the button on hover. Eye-catching.',
  },
  {
    label: 'Option 3 — Warm Gradient Slide',
    cls: 'btn-gradient',
    name: 'Warm Gradient Slide',
    desc: 'Gradient slides from terracotta-orange to crimson on hover.',
  },
  {
    label: 'Option 4 — Double-Ring Outline',
    cls: 'btn-outline',
    name: 'Double-Ring Outline',
    desc: 'A crisp border ring expands outward on hover. Clean & editorial.',
  },
  {
    label: 'Option 5 — Fill Sweep (ghost → solid)',
    cls: 'btn-sweep',
    name: 'Fill Sweep',
    desc: 'Starts as an outlined ghost button, fills solid crimson on hover.',
  },
];

document.addEventListener('DOMContentLoaded', () => {
  sections.forEach((s, i) => {
    document.body.insertAdjacentHTML('beforeend', `
      <div class="section">
        <div class="section-label">${s.label}</div>
        <div class="bg-layer">${arcsBg()}</div>
        ${nav(s.cls)}
        <div class="hero-body">
          <div class="hero-pill"><span class="pill-dot"></span>Now Booking — Summer Cohort</div>
          <div class="hero-headline">Your brand,<br>built with<br>intention.</div>
          <div class="hero-sub">CY Studios is a boutique creative agency taking clients in cohorts — so every brand gets the attention it deserves.</div>
          <button class="btn-base ${s.cls}">Book a Consultation →</button>
          <div class="effect-meta">
            <div class="effect-name">${s.name}</div>
            <div class="effect-desc">${s.desc}</div>
          </div>
        </div>
        ${ticker()}
      </div>
      ${i < sections.length - 1 ? '<div class="divider"></div>' : ''}
    `);
  });
});
</script>

</body>
</html>
